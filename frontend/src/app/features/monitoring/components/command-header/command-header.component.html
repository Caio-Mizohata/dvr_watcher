<header class="command-header">
  <div class="brand-block" aria-label="CCTV Command Center">
    <div class="brand-mark" aria-hidden="true">
      <span></span>
    </div>
    <div class="brand-copy">
      <p class="eyebrow">Sistema de Monitoramento de Câmeras</p>
      <h1>Angular CCTV</h1>
      <span>Monitoramento em tempo real feito em Angular com FastAPI + WebSockets + OpenCV</span>
    </div>
  </div>

  <div class="operations-meta" aria-label="Status operacional">
    <div class="status-pill">
      <span class="pulse-dot" aria-hidden="true"></span>
      Rede Local
    </div>
    <div class="status-pill server">
      FastAPI :{{ backendPort }}
    </div>
    <div class="coverage">
      <span>{{ onlineTotal() }}/{{ totalCameras() }}</span>
      cameras online
    </div>
    <time class="clock" [attr.datetime]="time()">{{ time() }}</time>
  </div>
</header>
